version: '3.8'

services:
  # Frontend & Backend
  web:
    build: .
    container_name: staysalad_web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - MONGODB_URI=mongodb://db:27017/staysalad
      - JWT_SECRET=super-secret-key-staysalad-2026
    depends_on:
      - db
    command: npm run dev

  # Database
  db:
    image: mongo:latest
    container_name: staysalad_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
