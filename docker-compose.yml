version: '3.8'

services:
  # Frontend & Backend
  staysalad_web:
    build: .
    container_name: staysalad_web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/staysalad
      - JWT_SECRET=2d2b8b9afef2e2cddc353e3ddcd4a6bf17a4eadZ
    depends_on:
      - mongodb
    command: npm run dev

  # Database
  mongodb:
    image: mongo:latest
    container_name: staysalad_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
